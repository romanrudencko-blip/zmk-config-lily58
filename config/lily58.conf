# Uncomment to enable encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment the following line to enable the Lily58 OLED Display
CONFIG_ZMK_DISPLAY=y

CONFIG_ZMK_SLEEP=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
# 不使用自定义状态屏幕
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=n
# 键盘空闲时息屏
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y

# ===================== SPI与输入设备 =====================
# 启用SPI总线支持
CONFIG_SPI=y
# 启用输入设备支持
CONFIG_INPUT=y
# 启用外部电源检测
CONFIG_ZMK_EXT_POWER=y

# ===================== 电控相关 =====================
# 以下参数请勿修改，它用于键盘某些外设供电，与RGB背光无关
CONFIG_ZMK_BACKLIGHT=y
# 开机时背光亮度为100，
CONFIG_ZMK_BACKLIGHT_BRT_START=100
# 开机时自动开启背光
CONFIG_ZMK_BACKLIGHT_ON_START=y
# 空闲时自动关闭背光
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=n



# ===================== 引脚控制 =====================
# 启用引脚控制
CONFIG_PINCTRL=y

# ===================== 指点设备（鼠标）相关 =====================
# 启用指点设备支持
CONFIG_ZMK_POINTING=y
# 启用平滑滚动
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=n

# ===================== USB日志 =====================
# 启用USB日志输出
CONFIG_ZMK_USB_LOGGING=n

# ===================== RGB灯带相关 =====================
# 启用WS2812灯带支持
CONFIG_WS2812_STRIP=y
# 启用RGB底灯
CONFIG_ZMK_RGB_UNDERGLOW=y
# 开机时自动开启RGB底灯
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n
# 空闲时自动关闭RGB底灯
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
# RGB底灯初始色相（绿色系）
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=160
# RGB底灯初始特效（3号特效）
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3
#RGB开关可以同时控制输出电源
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y

# ========== 其它可选项（如有需要可取消注释） ==========
# 断开USB连接时自动关闭RGB灯
# CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y
#防抖时间，如果追求低延迟，可以适当缩短，如果发生连击可适当延长
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Enable 32kHz crystal
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_30PPM=y

CONFIG_GPIO=y
